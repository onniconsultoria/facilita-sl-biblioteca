          <h1>Glossário de Termos</h1>
          <dl class="doc-meta">
            <div><dt>Fonte primária</dt><dd><span class="src src-ata">ATA</span> <span class="src src-plano">PLANO V3</span></dd></div>

          <h3>Ação revisional</h3>
          <p>Ação judicial movida pelo devedor (ou por quem assumiu seus direitos via cessão) para revisar cláusulas de um contrato de financiamento, geralmente alegando abusividade nos encargos.</p>

          <h3>Ação revisional por dependência</h3>
          <p>Ação revisional ajuizada como processo dependente/conexo a uma ação de busca e apreensão já em curso, permitindo tramitação vinculada e mais rápida.</p>

          <h3>Apropriação Indébita</h3>
          <p>Crime configurado quando alguém se apropria de bem que deveria devolver (ex.: um bem alugado). No modelo de locação com opção de compra, o não pagamento pelo locatário é enquadrado como apropriação indébita, permitindo retomada mais rápida do veículo do que em uma ação civil comum.</p>

          <h3>Busca e Apreensão</h3>
          <p>Ação judicial usada por instituições financeiras para retomar um veículo financiado em caso de inadimplência do financiado original.</p>

          <h3>Capitalização diária (juros)</h3>
          <p>Prática de calcular juros sobre juros diariamente; frequentemente contestada judicialmente como cláusula abusiva em contratos de financiamento veicular.</p>

          <h3>Cessão de Direitos</h3>
          <p>Contrato pelo qual o devedor original transfere a um terceiro (a empresa) os direitos e obrigações relativos ao veículo financiado, geralmente acompanhado de procuração.</p>

          <h3>Mora do Credor</h3>
          <p>Tese jurídica segundo a qual o próprio credor (banco) estaria em situação irregular (ex.: por cobrar juros abusivos previamente), o que pode ser usado para suspender a mora do devedor.</p>

          <h3>Multa NIC</h3>
          <p>Multa aplicada por Não Indicação do Condutor infrator dentro do prazo legal — risco relevante para uma locadora de veículos (o CNPJ da empresa responde caso não indique o condutor a tempo).</p>

          <h3>Renajud</h3>
          <p>Sistema do Poder Judiciário que permite o registro de restrições judiciais sobre veículos (bloqueio, penhora, etc.) diretamente nas bases de trânsito (Detran).</p>

          <h3>SERPRO</h3>
          <p>Serviço Federal de Processamento de Dados — órgão que fornece bases de dados públicas (incluindo dados de trânsito) utilizadas para integrações de monitoramento de multas e CNH.</p>

          <h3>Success fee</h3>
          <p>Remuneração variável condicionada ao sucesso de um resultado específico (ex.: liberação de um veículo em disputa judicial).</p>

          <blockquote><p>Ver também: <a data-nav="juridico">Estrutura Jurídica e Tese Legal</a>, <a data-nav="locacao">Modelo de Locação com Opção de Compra</a>, <a data-nav="tecnologia">Infraestrutura Tecnológica</a>.</p></blockquote>
        `

        btn.innerHTML = `<span class="nav-num">${d.num}</span><span>${d.title}</span>`;
        btn.addEventListener('click', () => navigate(d.id));
        nav.appendChild(btn);
      });
    });

      const section = document.createElement('article');
      section.className = 'doc';
      section.id = 'doc-' + d.id;
      section.innerHTML = d.html + `<footer class="doc-foot"><span>Facilita &amp; SL Investe — Biblioteca de Conhecimento · Documento ${d.num} · v1.0</span><span class="classification">Confidencial — uso interno</span></footer>`;

    const cardsWrap = document.getElementById('index-cards');
    docs.filter(d => d.id !== 'indice').forEach(d => {

      card.addEventListener('click', () => navigate(d.id));
      cardsWrap.appendChild(card);
    });

    function navigate(id) {
      document.querySelectorAll('.doc').forEach(el => el.classList.remove('active'));
      document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
      const target = document.getElementById('doc-' + id);
      if (target) target.classList.add('active');
      const navBtn = document.querySelector(`.nav-item[data-id="${id}"]`);
      if (navBtn) navBtn.classList.add('active');
      window.scrollTo({ top: 0, behavior: 'instant' });
      history.replaceState(null, '', '#' + id);
    }

    document.body.addEventListener('click', e => {
      const a = e.target.closest('[data-nav]');
      if (a) { e.preventDefault(); navigate(a.dataset.nav); }
