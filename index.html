<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Facilita &amp; SL Investe — Biblioteca de Conhecimento</title>
<meta name="description" content="Biblioteca de conhecimento da transição estratégica Facilita &amp; SL Investe: modelo de compra, venda e locação de veículos com opção de compra.">
<meta name="robots" content="noindex, nofollow">
<style>
  :root {
    --paper: #FAFAF8;
    --paper-raised: #FFFFFF;
    --ink: #151815;
    --ink-soft: #5C6259;
    --ink-faint: #8B9086;
    --line: #DEDACE;
    --line-strong: #C7C2B2;
    --rule: #0B0D0C;
    --accent: #A6321F;
    --accent-ink: #7A2416;
    --accent-tint: #F3E6E1;
    --mono: 'JetBrains Mono', ui-monospace, 'SF Mono', Menlo, monospace;
    --display: 'Fraunces', 'Iowan Old Style', 'Palatino Linotype', Georgia, serif;
    --sans: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }

  * { box-sizing: border-box; }
  ::selection { background: var(--accent-tint); color: var(--accent-ink); }

  html {
    scroll-behavior: smooth;
  }
  @media (prefers-reduced-motion: reduce) {
    html { scroll-behavior: auto; }
  }

  html, body {
    margin: 0;
    padding: 0;
    background: var(--paper);
    color: var(--ink);
    font-family: var(--sans);
    -webkit-font-smoothing: antialiased;
  }

  body {
    display: grid;
    grid-template-columns: 296px 1fr;
    min-height: 100vh;
  }

  @media (max-width: 900px) {
    body { grid-template-columns: 1fr; }
  }

  a { color: inherit; }
  button { font: inherit; }

  :focus-visible {
    outline: 2px solid var(--accent);
    outline-offset: 2px;
  }

  /* ================= Rail (left navigation) ================= */

  .rail {
    background: var(--rule);
    color: #E7E5DD;
    position: sticky;
    top: 0;
    height: 100vh;
    overflow-y: auto;
    padding: 0;
    display: flex;
    flex-direction: column;
  }

  @media (max-width: 900px) {
    .rail { position: relative; height: auto; }
  }

  .rail::-webkit-scrollbar { width: 8px; }
  .rail::-webkit-scrollbar-thumb { background: #2A2D26; border-radius: 4px; }

  .rail-head {
    padding: 30px 26px 24px;
    border-bottom: 1px solid #262922;
  }

  .rail-mark {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 18px;
  }

  .rail-mark-glyph {
    width: 30px;
    height: 30px;
    border: 1px solid #4A4D42;
    border-radius: 2px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: var(--display);
    font-size: 15px;
    font-weight: 600;
    color: #E7E5DD;
    flex-shrink: 0;
  }

  .rail-mark-text {
    font-family: var(--mono);
    font-size: 10.5px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: #9B9E92;
    line-height: 1.5;
  }

  .rail-mark-text strong {
    display: block;
    color: #E7E5DD;
    font-size: 12px;
    letter-spacing: 0.06em;
  }

  .rail-title {
    font-family: var(--display);
    font-size: 19px;
    font-weight: 500;
    font-style: italic;
    line-height: 1.35;
    color: #F2F1EA;
  }

  nav.rail-nav {
    padding: 10px 14px 28px;
    display: flex;
    flex-direction: column;
    flex: 1;
  }

  .rail-group-label {
    font-family: var(--mono);
    font-size: 9.5px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: #6E7266;
    margin: 20px 12px 6px;
  }

  .rail-group-label:first-child { margin-top: 12px; }

  .rail-item {
    display: grid;
    grid-template-columns: 26px 1fr;
    align-items: baseline;
    gap: 2px;
    padding: 8px 12px;
    border-radius: 3px;
    text-decoration: none;
    color: #B7B9AC;
    font-size: 13px;
    cursor: pointer;
    border: none;
    background: none;
    width: 100%;
    text-align: left;
    line-height: 1.35;
  }

  .rail-item:hover { background: #1B1E17; color: #F2F1EA; }

  .rail-item.active {
    background: #1B1E17;
    color: #F2F1EA;
    box-shadow: inset 2px 0 0 var(--accent);
  }

  .rail-num {
    font-family: var(--mono);
    font-size: 11px;
    color: #6E7266;
  }

  .rail-item.active .rail-num { color: var(--accent); }

  .rail-foot {
    margin-top: auto;
    padding: 16px 26px 22px;
    border-top: 1px solid #262922;
    font-family: var(--mono);
    font-size: 10px;
    line-height: 1.7;
    color: #6E7266;
    letter-spacing: 0.02em;
  }

  .rail-foot strong { color: #9B9E92; }

  /* ================= Main column ================= */

  main {
    min-width: 0;
  }

  .sheet {
    display: none;
    padding: 64px clamp(32px, 6vw, 96px) 140px;
  }

  .sheet.active { display: block; }

  @media (max-width: 900px) {
    .sheet { padding: 44px 24px 100px; }
  }

  /* running text stays readable width; wide elements (tables) are free to stretch */
  .sheet h1, .sheet .cover, .sheet .kicker, .sheet .doc-meta,
  .sheet p, .sheet ul, .sheet ol, blockquote, .provenance {
    max-width: 860px;
  }

  .sheet h2, .sheet h3 { max-width: 860px; }

  .kicker {
    display: flex;
    align-items: center;
    gap: 10px;
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--accent);
    font-weight: 600;
    margin-bottom: 18px;
  }

  .kicker::before {
    content: '';
    width: 22px;
    height: 1px;
    background: var(--accent);
  }

  .sheet h1 {
    font-family: var(--display);
    font-size: 40px;
    font-weight: 600;
    line-height: 1.12;
    letter-spacing: -0.01em;
    color: var(--ink);
    margin: 0 0 30px;
    text-wrap: balance;
  }

  .sheet h2 {
    font-family: var(--display);
    font-size: 23px;
    font-weight: 600;
    color: var(--ink);
    margin: 44px 0 16px;
    text-wrap: balance;
    display: flex;
    align-items: baseline;
    gap: 12px;
  }

  .sheet h2:first-of-type { margin-top: 0; }

  .sheet h3 {
    font-family: var(--mono);
    font-size: 12.5px;
    font-weight: 600;
    color: var(--accent-ink);
    margin: 28px 0 10px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }

  .sheet p {
    font-size: 16px;
    line-height: 1.7;
    color: var(--ink);
    margin: 0 0 17px;
  }

  .sheet ul, .sheet ol {
    margin: 0 0 20px;
    padding-left: 0;
    font-size: 16px;
    line-height: 1.68;
    list-style: none;
  }

  .sheet ul li, .sheet ol li {
    position: relative;
    padding-left: 22px;
    margin-bottom: 11px;
  }

  .sheet ul li::before {
    content: '—';
    position: absolute;
    left: 0;
    color: var(--ink-faint);
  }

  .sheet ol { counter-reset: item; }
  .sheet ol li { counter-increment: item; }
  .sheet ol li::before {
    content: counter(item) '.';
    position: absolute;
    left: 0;
    font-family: var(--mono);
    font-size: 13px;
    color: var(--accent);
    font-weight: 600;
  }

  .sheet strong { color: var(--ink); font-weight: 700; }

  .sheet a { color: var(--accent-ink); text-decoration-color: #D9B8AF; text-underline-offset: 3px; }
  .sheet a:hover { text-decoration-color: var(--accent); }

  blockquote {
    margin: 24px 0;
    padding: 16px 20px;
    background: var(--paper-raised);
    border: 1px solid var(--line);
    border-left: 3px solid var(--accent);
    font-size: 14.5px;
    color: var(--ink-soft);
    line-height: 1.6;
  }

  blockquote p { margin: 0; font-size: 14.5px; color: var(--ink-soft); max-width: none; }
  blockquote p + p { margin-top: 10px; }

  /* tables */
  .table-wrap {
    overflow-x: auto;
    margin: 6px 0 26px;
    border: 1px solid var(--line-strong);
  }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 14px;
    background: var(--paper-raised);
  }

  th {
    text-align: left;
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.07em;
    text-transform: uppercase;
    color: var(--ink-soft);
    background: #F2F0E8;
    padding: 11px 16px;
    border-bottom: 1px solid var(--line-strong);
    white-space: nowrap;
  }

  td {
    padding: 13px 16px;
    border-bottom: 1px solid var(--line);
    line-height: 1.55;
    vertical-align: top;
    font-variant-numeric: tabular-nums;
  }

  tr:last-child td { border-bottom: none; }

  .status {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-family: var(--mono);
    font-size: 10.5px;
    letter-spacing: 0.02em;
    padding: 3px 9px 3px 7px;
    white-space: nowrap;
    border: 1px solid currentColor;
  }

  .status::before { content: ''; width: 5px; height: 5px; border-radius: 50%; background: currentColor; }

  .status-pendente { color: #8A4A1F; }
  .status-andamento { color: #1F4E8A; }

  /* ---------- Table of contents (sumário) ---------- */

  .toc {
    display: flex;
    flex-direction: column;
    margin: 22px 0 6px;
    border-top: 1px solid var(--rule);
  }

  .toc-row {
    display: grid;
    grid-template-columns: 44px 1fr auto;
    align-items: baseline;
    gap: 18px;
    padding: 15px 4px;
    border-bottom: 1px solid var(--line);
    text-decoration: none;
    cursor: pointer;
    background: none;
    border-left: none;
    border-right: none;
    border-top: none;
    width: 100%;
    text-align: left;
  }

  .toc-row:hover .toc-title { color: var(--accent-ink); }
  .toc-row:hover .toc-num { color: var(--accent); }

  .toc-num {
    font-family: var(--display);
    font-size: 20px;
    font-weight: 500;
    font-style: italic;
    color: var(--ink-faint);
  }

  .toc-title {
    font-family: var(--sans);
    font-size: 15.5px;
    font-weight: 600;
    color: var(--ink);
  }

  .toc-group {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--ink-faint);
  }

  /* ---------- Doc meta block (expediente) ---------- */

  .doc-meta {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 0;
    margin-bottom: 36px;
    border: 1px solid var(--line-strong);
  }

  @media (max-width: 640px) {
    .doc-meta { grid-template-columns: 1fr 1fr; }
  }

  .doc-meta > div {
    padding: 13px 16px;
    border-right: 1px solid var(--line);
  }
  .doc-meta > div:last-child { border-right: none; }

  .doc-meta dt {
    font-family: var(--mono);
    font-size: 9.5px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--ink-faint);
    margin-bottom: 4px;
  }

  .doc-meta dd {
    margin: 0;
    font-size: 13px;
    font-weight: 600;
    color: var(--ink);
  }

  .flag {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-family: var(--mono);
    font-size: 10.5px;
    color: var(--accent-ink);
  }

  .flag::before { content: ''; width: 6px; height: 6px; background: var(--accent); flex-shrink: 0; }

  /* ---------- Source tags ---------- */

  .src {
    display: inline-flex;
    align-items: center;
    font-family: var(--mono);
    font-size: 9.5px;
    letter-spacing: 0.03em;
    padding: 2px 6px;
    border: 1px solid currentColor;
    margin-right: 5px;
    white-space: nowrap;
  }

  .src-ata { color: #4A5C42; }
  .src-plano { color: #7A6339; }

  /* ---------- Provenance banner ---------- */

  .provenance {
    display: flex;
    gap: 12px;
    align-items: flex-start;
    margin: 0 0 34px;
    padding: 15px 18px;
    background: #F2F0E8;
    border-left: 3px solid var(--ink-faint);
    font-size: 13.5px;
    color: var(--ink-soft);
    line-height: 1.6;
  }

  /* ---------- Cover ---------- */

  .cover {
    padding: 8px 0 4px;
  }

  .cover-super {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--accent);
    font-weight: 600;
    margin-bottom: 22px;
    display: block;
  }

  .cover-title {
    font-family: var(--display);
    font-size: 52px;
    line-height: 1.05;
    font-weight: 600;
    letter-spacing: -0.015em;
    color: var(--ink);
    text-wrap: balance;
    margin: 0 0 8px;
  }

  .cover-title em {
    font-style: italic;
    font-weight: 500;
    color: var(--accent-ink);
  }

  .cover-dek {
    font-size: 17px;
    line-height: 1.65;
    color: var(--ink-soft);
    max-width: 640px;
    margin: 22px 0 0;
  }

  .cover-rule {
    height: 1px;
    background: var(--rule);
    margin: 34px 0 0;
  }

  dl.cover-meta {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    margin: 0;
  }

  @media (max-width: 640px) {
    dl.cover-meta { grid-template-columns: 1fr 1fr; }
  }

  dl.cover-meta > div {
    padding: 16px 20px 0 0;
  }

  dl.cover-meta dt {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--ink-faint);
    margin-bottom: 5px;
  }

  dl.cover-meta dd {
    margin: 0;
    font-size: 14px;
    font-weight: 600;
    color: var(--ink);
  }

  footer.sheet-foot {
    margin-top: 56px;
    padding-top: 22px;
    border-top: 1px solid var(--rule);
    font-size: 11px;
    color: var(--ink-faint);
    font-family: var(--mono);
    display: flex;
    justify-content: space-between;
    gap: 16px;
    flex-wrap: wrap;
    letter-spacing: 0.02em;
  }

  footer.sheet-foot .flag { color: var(--accent-ink); }
</style>
</head>

<body>
  <aside class="rail">
    <div class="rail-head">
      <div class="rail-mark">
        <div class="rail-mark-glyph">F</div>
        <div class="rail-mark-text"><strong>Facilita</strong>&amp; SL Investe</div>
      </div>

    </div>

  <main id="main"></main>

  <script>
    const docs = [
      {
        id: 'indice',
        num: '00',
        group: 'Início',
        title: 'Sumário',
        html: `
          <div class="cover">
            <span class="cover-super">Biblioteca de Conhecimento</span>
            <h1 class="cover-title">Facilita &amp; <em>SL&nbsp;Investe</em></h1>
            <p class="cover-dek">Registro consolidado da transição de modelo de negócio do grupo — da negociação de dívidas de pessoas físicas para a operação de compra, venda e locação de veículos com opção de compra. Compilado a partir da reunião estratégica de fundação e do Master Plan Estratégico V3.</p>

            <dl class="cover-meta">
              <div><dt>Classificação</dt><dd class="flag">Confidencial</dd></div>

          </div>

          <h2>Sumário</h2>
          <div class="toc" id="index-toc"></div>

          <h2>Fontes e proveniência</h2>
          <p>Cada seção deste documento indica sua origem: <span class="src src-ata">ATA</span> para decisões e fatos registrados na reunião estratégica, e <span class="src src-plano">PLANO V3</span> para especificações formalizadas no Master Plan Estratégico. Onde os dois se complementam, ambas as etiquetas aparecem.</p>
          <ul>
            <li><strong>Ata da reunião estratégica</strong> — registrada em 03/07/2026. Fonte primária das decisões de mudança de modelo, transição de gestão e plano de ação.</li>
            <li><strong>Master Plan Estratégico: Projeto Facilita &amp; SL Investe — V3</strong> — documento formal que detalha a estrutura societária/tributária (UDC Participações, Assessoria Facilita, Mobcar Veículos), o modelo de remuneração jurídica em 3 camadas do Dr. Ramon Nunes, e o modelo operacional completo. Tratado aqui como fonte de especificação técnica/societária.</li>
          </ul>

          <h2>Governança do documento</h2>
          <ul>
            <li>Ao final de cada reunião estratégica, registrar as decisões novas e atualizar os documentos temáticos relevantes, preservando as etiquetas de fonte.</li>
            <li>Quando o Master Plan for atualizado para uma V4+, revisar as referências cruzadas nesta biblioteca e incrementar a versão do documento.</li>
            <li>Manter o <a data-nav="plano">Plano de Ação</a> como o documento "vivo" de status das tarefas — é a única seção com estado mutável frequente.</li>
          </ul>
        `

        title: 'Mudança de Modelo de Negócio',
        html: `
          <div class="kicker">Estratégia · Seção 01</div>
          <h1>Mudança no Modelo de Negócio</h1>
          <dl class="doc-meta">
            <div><dt>Fonte primária</dt><dd><span class="src src-ata">ATA</span></dd></div>
            <div><dt>Status</dt><dd>Decisão validada</dd></div>
            <div><dt>Impacto</dt><dd>Core do negócio</dd></div>
            <div><dt>Revisão</dt><dd>03/07/2026</dd></div>

          <h2>Decisão</h2>
          <p>Migração <strong>definitiva</strong> do serviço tradicional de negociação de dívidas para pessoas físicas (CPF) para um modelo focado em <strong>compra, venda e locação de veículos com opção de compra</strong>.</p>

          <h2>Motivação</h2>
          <ul>
            <li>A venda de serviços de negociação de dívida a CPFs gerava <strong>margens baixas</strong>.</li>
            <li>O modelo antigo tinha <strong>alta complexidade operacional</strong> (volume de casos individuais, baixo ticket, gestão intensiva).</li>
            <li>O novo modelo usa um ativo físico (o veículo) como garantia e alavanca de recuperação rápida, reduzindo a dependência de processos judiciais longos.</li>
          </ul>

          <h2>Nova tese de negócio</h2>
          <p>O grupo passa a operar como um ecossistema de três frentes complementares:</p>
          <ul>
            <li><strong>Captação</strong> — identificação de veículos financiados por pessoas endividadas em bancos com histórico de cláusulas abusivas.</li>
            <li><strong>Jurídico</strong> — uso de teses revisionais para "limpar" o ativo (retirar a mora, liberar o carro) rapidamente.</li>
            <li><strong>Operação de ativos</strong> — compra, venda, intermediação e locação com opção de compra dos veículos já "limpos" juridicamente.</li>
          </ul>
          <blockquote><p>Ver também: <a data-nav="juridico">Estrutura Jurídica e Tese Legal</a>, <a data-nav="locacao">Modelo de Locação com Opção de Compra</a>.</p></blockquote>

          <h2>Relação com o Master Plan V3</h2>

            <tr><td><strong>Mobcar Veículos LTDA</strong></td><td>Operadora de ativos — compra, venda, consignação e locação dos veículos</td></tr>
          </table></div>
          <p>Essa estrutura é a implementação prática da decisão de mudança de modelo discutida em reunião.</p>
        `
      },
      {

        num: '02',
        group: 'Estratégia',
        title: 'Estrutura Jurídica e Tese Legal',
        html: `
          <div class="kicker">Estratégia · Seção 02</div>
          <h1>Estrutura Jurídica e Tese Legal</h1>
          <dl class="doc-meta">
            <div><dt>Fonte primária</dt><dd><span class="src src-ata">ATA</span><span class="src src-plano">V3</span></dd></div>

          <h2>Centralização em Santa Catarina</h2>
          <p>A operação jurídica será <strong>concentrada em Santa Catarina</strong>, devido à:</p>

          <h1>Glossário de Termos</h1>

          <h3>Ação revisional</h3>
          <p>Ação judicial movida pelo devedor (ou por quem assumiu seus direitos via cessão) para revisar cláusulas de um contrato de financiamento, geralmente alegando abusividade nos encargos.</p>

          <h3>Ação revisional por dependência</h3>
          <p>Ação revisional ajuizada como processo dependente/conexo a uma ação de busca e apreensão já em curso, permitindo tramitação vinculada e mais rápida.</p>

          <h3>Apropriação Indébita</h3>
          <p>Crime configurado quando alguém se apropria de bem que deveria devolver (ex.: um bem alugado). No modelo de locação com opção de compra, o não pagamento pelo locatário é enquadrado como apropriação indébita, permitindo retomada mais rápida do veículo do que em uma ação civil comum.</p>

          <h3>Busca e Apreensão</h3>
          <p>Ação judicial usada por instituições financeiras para retomar um veículo financiado em caso de inadimplência do financiado original.</p>

          <h3>Capitalização diária (juros)</h3>
          <p>Prática de calcular juros sobre juros diariamente; frequentemente contestada judicialmente como cláusula abusiva em contratos de financiamento veicular.</p>

          <h3>Cessão de Direitos</h3>
          <p>Contrato pelo qual o devedor original transfere a um terceiro (a empresa) os direitos e obrigações relativos ao veículo financiado, geralmente acompanhado de procuração.</p>

          <h3>Mora do Credor</h3>
          <p>Tese jurídica segundo a qual o próprio credor (banco) estaria em situação irregular (ex.: por cobrar juros abusivos previamente), o que pode ser usado para suspender a mora do devedor.</p>

          <h3>Multa NIC</h3>
          <p>Multa aplicada por Não Indicação do Condutor infrator dentro do prazo legal — risco relevante para uma locadora de veículos (o CNPJ da empresa responde caso não indique o condutor a tempo).</p>

          <h3>Renajud</h3>
          <p>Sistema do Poder Judiciário que permite o registro de restrições judiciais sobre veículos (bloqueio, penhora, etc.) diretamente nas bases de trânsito (Detran).</p>

          <h3>SERPRO</h3>
          <p>Serviço Federal de Processamento de Dados — órgão que fornece bases de dados públicas (incluindo dados de trânsito) utilizadas para integrações de monitoramento de multas e CNH.</p>

          <h3>Success fee</h3>
          <p>Remuneração variável condicionada ao sucesso de um resultado específico (ex.: liberação de um veículo em disputa judicial).</p>

        btn.className = 'rail-item';
        btn.dataset.id = d.id;
        btn.innerHTML = `<span class="rail-num">${d.num}</span><span>${d.title}</span>`;
        btn.addEventListener('click', () => navigate(d.id));
        nav.appendChild(btn);
      });
    });

    docs.forEach(d => {
      const section = document.createElement('article');
      section.className = 'sheet';
      section.id = 'doc-' + d.id;
      section.innerHTML = d.html + `<footer class="sheet-foot"><span>Facilita &amp; SL Investe — Biblioteca de Conhecimento · Doc. ${d.num} · v1.0</span><span class="flag">Confidencial — uso interno</span></footer>`;
      mainEl.appendChild(section);
    });

    const tocWrap = document.getElementById('index-toc');
    docs.filter(d => d.id !== 'indice').forEach(d => {
      const row = document.createElement('button');
      row.className = 'toc-row';
      row.innerHTML = `<span class="toc-num">${d.num}</span><span class="toc-title">${d.title}</span><span class="toc-group">${d.group}</span>`;
      row.addEventListener('click', () => navigate(d.id));
      tocWrap.appendChild(row);
    });

    function navigate(id) {
      document.querySelectorAll('.sheet').forEach(el => el.classList.remove('active'));
      document.querySelectorAll('.rail-item').forEach(el => el.classList.remove('active'));
      const target = document.getElementById('doc-' + id);
      if (target) target.classList.add('active');
      const navBtn = document.querySelector(`.rail-item[data-id="${id}"]`);
      if (navBtn) navBtn.classList.add('active');
      window.scrollTo({ top: 0, behavior: 'instant' });
      history.replaceState(null, '', '#' + id);
    }

    document.body.addEventListener('click', e => {
      const a = e.target.closest('[data-nav]');
      if (a) { e.preventDefault(); navigate(a.dataset.nav); }
    });

    const initial = location.hash ? location.hash.slice(1) : 'indice';
    navigate(docs.some(d => d.id === initial) ? initial : 'indice');
  </script>
</body>
</html>
